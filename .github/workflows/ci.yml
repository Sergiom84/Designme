name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: Unit + lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test shard 1
        run: npm run test:ci:shard -- 1/4

      - name: Test shard 2
        run: npm run test:ci:shard -- 2/4

      - name: Test shard 3
        run: npm run test:ci:shard -- 3/4

      - name: Test shard 4
        run: npm run test:ci:shard -- 4/4

      - name: Security audit
        run: npm run security:audit

  e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    # Run e2e in parallel with the unit job. Keeps wall-clock CI short and
    # lets unit regressions surface even if Playwright is flaky.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (for vite preview)
        run: npm run build

      - name: Run Playwright tests
        run: npm run e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14
