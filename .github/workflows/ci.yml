name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Typecheck + lint + audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm run security:audit

  unit:
    name: Unit tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/4', '2/4', '4/4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test shard
        run: npm run test:ci:shard -- ${{ matrix.shard }} --exclude tests/unit/quality/generatedHtmlQuality.test.ts --exclude tests/unit/electron/setupDetection.test.ts

  unit-extra:
    name: Unit file (${{ matrix.file }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file:
          - tests/unit/electron/providerRuns.test.ts
          - tests/unit/hooks/useGenerate.test.tsx
          - tests/unit/providers/askFlow.test.ts
          - tests/unit/providers/claudeCode.test.ts
          - tests/unit/providers/multiIdea.test.ts
          - tests/unit/references/styleReference.test.ts
          - tests/unit/settings/localOpenAI.test.ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test file
        run: npx vitest run --maxWorkers=1 ${{ matrix.file }}

  setup-detection:
    name: Setup detection unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test setup detection
        run: npx vitest run --maxWorkers=1 tests/unit/electron/setupDetection.test.ts

  html-quality:
    name: Generated HTML quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test generated HTML quality
        run: npx vitest run --maxWorkers=1 tests/unit/quality/generatedHtmlQuality.test.ts

  e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    # Run e2e in parallel with the unit job. Keeps wall-clock CI short and
    # lets unit regressions surface even if Playwright is flaky.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (for vite preview)
        run: npm run build

      - name: Run Playwright tests
        run: npm run e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14
